      <stop offset="90%" stop-color="#ff4fd8" stop-opacity="0.35"/>
      <stop offset="97%" stop-color="#3df0ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="spec53" cx="32%" cy="24%" r="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bot53" cx="55%" cy="88%" r="35%">
      <stop offset="0%" stop-color="#3df0ff" stop-opacity="0.25"/>
