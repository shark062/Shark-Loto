<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <radialGradient id="glassBody53" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#dfeaff" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#b9c8e6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#9aa9c9" stop-opacity="0.25"/>
    </radialGradient>
    <linearGradient id="iris53" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#3df0ff"/>
