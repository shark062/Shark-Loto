    </radialGradient>
    <radialGradient id="halo53" cx="50%" cy="50%" r="50%">
      <stop offset="68%" stop-color="#7a5cff" stop-opacity="0"/>
      <stop offset="85%" stop-color="#ff4fd8" stop-opacity="0.22"/>
      <stop offset="95%" stop-color="#3df0ff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3df0ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad53" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
